features:
  - feature: Won the Engineering Inspiration Award at the St. Louis Regional
    icon: fa-search
  - feature: Made it to the FRC World Championship and competed in the Archimedes Division
    icon: fa-puzzle-piece
  - feature: Won the Judges' Award at the Greater Kansas City Regional
    icon: fa-gavel
specifications:
  - 6-wheel dropped center drive with 8" Andymark Plaction wheels
  - Andymark Super Shifters provide two drive speeds
  - Spaced wheels prevent chain damage traversing defenses
  - Vertical 2-wheel shooter with telescoping uptake rollers
  - Combined intake system with belts/rollers from floor
  - Shooter angle adjusts from 30-60 degrees
  - Pneumatic arm provides over 19 lbs downforce for balancing
  - Custom polycarbonate electronics plate with integrated wire management
capabilities:
  - Overcomes The Bump defense
  - Tips and balances on The Bridge
  - Picks up and shoots basketballs
  - Variable shooter wheel speeds for distance/arc control
competitions:
  - Greater Kansas City Regional
  - St. Louis Regional
  - World Championship
  - Ozark Mountain Brawl
  - CowTown ThrowDown
