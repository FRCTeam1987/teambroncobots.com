name: Jekyll site CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - qa
  pull_request:
    branches:
      - main
      - qa

jobs:
  docker-dev-build:
    name: Docker Compose dev build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build dev service image
      run: docker compose build dev

  docker-jekyll-smoke:
    name: Docker Compose jekyll smoke test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build jekyll service image
      run: docker compose build jekyll

    - name: Start jekyll service
      run: docker compose up -d jekyll

    - name: Install Playwright
      run: |
        npm install --no-save playwright
        npx playwright install --with-deps chromium

    - name: Verify site responds with Playwright
      run: |
        node -e "const { chromium } = require('playwright'); (async () => { const browser = await chromium.launch({ headless: true }); const page = await browser.newPage(); let lastError; for (let i = 0; i < 10; i++) { try { const response = await page.goto('http://localhost:4000', { waitUntil: 'domcontentloaded', timeout: 10000 }); if (response && response.ok()) { await browser.close(); process.exit(0); } lastError = new Error('Non-OK response from site'); } catch (error) { lastError = error; } await new Promise(resolve => setTimeout(resolve, 3000)); } await browser.close(); throw lastError || new Error('Site did not respond in time'); })();"

    - name: Stop jekyll service
      if: always()
      run: docker compose down

  jekyll:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    # Use GitHub Actions' cache to shorten build times and decrease load on servers
    - uses: actions/cache@v4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile') }}
        restore-keys: |
          ${{ runner.os }}-gems-

    - name: Setup Node environment
      run: npm install
      working-directory: ./

    # Standard usage
    - uses: helaili/jekyll-action@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        jekyll_src: './'
        build_dir: _site
        build_only: true

    - name: Create CNAME file (prod)
      run: |
        sudo chown -R $USER:$USER _site
        touch _site/CNAME
        echo teambroncobots.com >> '_site/CNAME'
        tree _site
      shell: bash
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    - name: Deploy (prod) 🚀
      uses: JamesIves/github-pages-deploy-action@v4
      env:
        TBA_API_KEY : ${{ secrets.TBA_API_KEY }}
      with:
        folder: _site # The folder the action should deploy.
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    - name: Create CNAME file (qa)
      run: |
        sudo chown -R $USER:$USER _site
        touch _site/CNAME
        echo dev.teambroncobots.com >> '_site/CNAME'
        tree _site
      shell: bash
      if: github.ref == 'refs/heads/qa' && github.event_name != 'pull_request'

    - name: Deploy (qa) 🚀
      uses: milanmk/actions-file-deployer@main
      with:
        remote-protocol: 'sftp'
        remote-host: 'dev.teambroncobots.com'
        remote-user: 'cecgri'
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
        local-path: './_site'
        remote-path: '/home/cecgri/dev.teambroncobots.com'
        sync: 'full'
      if: github.ref == 'refs/heads/qa' && github.event_name != 'pull_request'
