---
layout: page
---

<div class="content" style="margin: auto; font-family:Rockwell, Roboto, sans-serif;">
    <div style="text-align:center">
        <p class="title is-3">{{ page.title }}</p>
        <p class="subtitle is-5">
            <span class="icon"><i class="fas fa-calendar-alt"></i></span>
            {{ page.datetime | date_to_long_string }}
            &nbsp;|&nbsp;
            <span class="icon"><i class="fas fa-clock"></i></span>
            {{ page.datetime | date: "%I:%M %p" }}
            {% if page.location %}
            &nbsp;|&nbsp;
            {{ page.location }}
            {% endif %}
        </p>
        {% if page.address %}
        <p class="subtitle is-6">
            <span class="icon"><i class="fas fa-location-dot"></i></span>
            <a href="https://www.google.com/maps/search/?api=1&query={{ page.address | url_encode }}" target="_blank">{{ page.address }}</a>
        </p>
        {% endif %}
    </div>
    <hr />
    {{ content }}
</div>
