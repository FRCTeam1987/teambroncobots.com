content:
- name: team_stats
  label: Team Stats
  type: file
  path: content/team_stats.yml
  list:
    collapsible:
      collapsed: true
      summary: "{title}: {count}"
  fields:
  - name: title
    label: Title
    type: string
  - name: count
    label: Count
    type: number
  - name: icon
    label: Icon
    type: string
