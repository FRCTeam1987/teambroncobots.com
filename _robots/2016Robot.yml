robot_name: Knight Mare
game_name: STRONGHOLD
year: 2016
robot_image: images/robots/2016robot.png
game_logo: images/robots/Competition Logos/2016_FIRST_Stronghold.svg
game_video: VqOKzoHJDjA
awards:
  - award: Broncobots won the FIRST Dean's List Finalist Award (Connie Wentworth)
    icon: fa-user
  - award: Made it to the FRC World Championship and competed in the Carson Division
    icon: fa-rocket
  - award: Won the Regional Engineering Inspiration Award at the Hub City Regional
    icon: fa-unlock-alt4
specifications:
  - West coast drive with 10 wheels - 6 outer 8" pneumatics, 4 inner 5" BaneBots
  - Wheels are chain driven from gearboxes
  - Drive has encoder sensors for position tracking
  - Shooter uses 2 BaneBot wheels, aluminum flywheel, 3 to 1 planetary 775 Pro motor
  - Intake roller driven by chain at end of manipulator arm
  - Manipulator arm uses 2 pneumatic cylinders for positioning
  - Main programming in C++ with autonomous sequences
capabilities:
  - Can breach all defenses
  - Scores in high and low goals
  - Efficient boulder intake
  - Autonomous defense crossing and shooting in 15 seconds
  - Sensor-based decision making and positioning
  - Repositions boulder into shooter with intake roller
competitions:
  - Greater Kansas City Regional
  - Hub City Regional
  - World Championship
  - Missouri State Championship
  - CowTown ThrowDown
