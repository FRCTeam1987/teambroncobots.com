

year: 2013
robot_name: Dennis The Menace
game_name: Ultimate Ascent Robot 2013
game_logo: /images/robots/Competition Logos/2013_Ultimate_Ascent.png
robot_image: /images/robots/2013robot.png
game_video: itHNW2OFr4Y
features:
  - feature: Made it to the FRC World Championship and competed in the Galileo Division
    icon: fa-exclamation
  - feature: Was a regional finalist at the Greater Kansas City Regional
    icon: fa-compass
  - feature: Won the Regional Chairman's Award at the Alamo Regional
    icon: fa-leaf
specifications:
  - 6-wheel drop center drive, custom 2" aluminum C-channel frame
  - Frame is 26"x30" for maneuverability and construction space
  - Linear 2-wheel shooter with pneumatic Frisbee feed
  - Adjustable shooter angle with 2 pneumatic cylinders
  - Hopper holds 4 discs, feeds directly to indexer
  - Hopper made from welded sheet metal and polycarbonate extension
  - Climbers use actuators with hooks, string pots, and limit switches
  - LED light strips, RGB decorative lights, high power aiming light
capabilities:
  - Accurate 3-point shooting from behind pyramids
  - Stores 4 discs in hopper
  - Collects discs from center feed slot
  - Climbs to first pyramid level
  - Shoots 3 discs autonomously into 3-point goal
  - Quick release hopper/shooter for maintenance
competitions:
  - Greater Kansas City Regional
  - Alamo Regional
  - World Championship
  - Ozark Mountain Brawl
  - CowTown ThrowDown
