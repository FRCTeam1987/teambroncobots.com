robot_name: Darth Conveydor
game_name: RECYCLE RUSH Robot
year: 2015
robot_image: images/robots/2015robot.png
game_logo: images/robots/Competition Logos/2015_Recycle_Rush.svg
game_video: W6UYFKNGHJ8
awards:
  - award: Broncobots won the FIRST Dean's List Finalist Award (Austin Ahern)
    icon: fa-user
  - award: Ranked 12 in the Buckeye Regional
    icon: fa-circle
  - award: Had an average playoff score of 117.40 at the Buckeye Regional
    icon: fa-arrow-up4
specifications:
  - West coast drive with 2 West Coast Products gearboxes
  - 6" wheels in 6-wheel (no drop) configuration, performance track tread
  - Wheels are chain driven from gearboxes
  - Drive has encoder and gyro sensors for position/angle tracking
  - Lifter uses chain drive from 9 to 1 gearbox with CIM motor
  - Lifter has sensors for tote detection and height tracking
  - Uses pneumatics to grip totes with plastic sliders
  - Conveyor uses 6 polycord belts, passive/powered rollers, BaneBots motor
  - Pusher uses 2 pneumatic cylinders (1.5" bore, 15" stroke) with chain extension
capabilities:
  - Fully autonomous operation
  - Quickly and efficiently stacks 6 totes
  - Can create stack of 6 totes in 30 seconds
  - Pusher can push all 30 totes (240 lbs) onto scoring platform
  - Lifter can lift 6 tote stack with can on top
  - Detaches conveyor for transport/setup
competitions:
  - Greater Kansas City Regional
  - Buckeye Regional
  - Missouri State Championship
  - CowTown ThrowDown
