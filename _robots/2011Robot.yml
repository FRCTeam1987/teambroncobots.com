robot_name: Dr. Claw
game_name: Logo Motion
year: 2011
robot_image: images/robots/2011robot.png
game_logo: images/robots/Competition Logos/2011_Logo_Motion.png
game_video: aH_9QHZpsfs
awards:
  - award: Ranked third in the Midwest Regional
    icon: fa-lemon
  - award: Won the Quality Award sponsored by Motorola at the Midwest Regional
    icon: fa-key
  - award: Won the Website Award at the Midwest Regional
    icon: fa-laptop 2
specifications:
  - Robot uses mecanum wheels for omnidirectional drive
  - Elevator constructed from 1.5" T-slots, 53" bottom and 43" top sections
  - Elevator raised by winch with two window motors and polymer pulleys
  - Tube gripper uses pneumatics and rubber bands for gripping
  - Gripper has polymer/rubber rollers to prevent snagging
  - Minibot deployed from aluminum drawer slides with pneumatic cylinders/latches
capabilities:
  - Can drive forward, backward, left, right, and strafe sideways
  - Picks up tubes from ground or feeder slot
  - Scores on top two rows autonomously
  - Deploys custom minibot
  - Tracks lines on field during autonomous
competitions:
  - Midwest Regional
  - CowTown ThrowDown
