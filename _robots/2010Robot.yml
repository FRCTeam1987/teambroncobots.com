robot_name: Lance-A-Lot
game_name: Breakaway
year: 2010
robot_image: /images/robots/2010robot.png
game_logo: /images/robots/Competition Logos/2010_Breakaway.svg
game_video: Bb1P43OSfOU
awards:
  - award: Made it to the FRC World Championship and competed in the Archimedes Division
    icon: fa-arrow-right
  - award: Won the Oklahoma Regional
    icon: fa-bolt
  - award: Won the Regional Chairman's Award at the Oklahoma Regional
    icon: fa-smile4
specifications:
  - Robot uses mecanum wheels for omnidirectional drive
  - Elevator constructed from 1.5" T-slots, 53" bottom and 43" top sections
  - Elevator raised by winch with two window motors and polymer pulleys
  - Tube gripper uses pneumatics and rubber bands for gripping
  - Gripper has polymer/rubber rollers to prevent snagging
  - Minibot deployed from drawer slides with pneumatic cylinders/latches
capabilities:
  - Can drive forward, backward, left, right, and strafe sideways
  - Picks up tubes from ground or feeder slot
  - Scores on top two rows autonomously
  - Deploys custom minibot
  - Tracks lines on field during autonomous
competitions:
  - Oklahoma City Regional
  - World Championship
  - CowTown ThrowDown
