robot_name: Perseus
game_name: STEAMWORKS
year: 2017
robot_image: "../images/robots/2017robot.png"
game_logo: "../../images/robots/Competition Logos/2017_FIRST_Steamworks.svg"
game_video: EMiNmJW7enI
awards:
  - award: Won the Greater Kansas City Regional
    icon: fa-cog
  - award: Ranked 21 in the Indiana Robotics Invitational
    icon: fa-cogs
  - award: Broncobot won the FIRST Dean's List Finalist Award (Levi Madden)
    icon: fa-child 7
specifications:
  - West coast drive with eight 4in Colson wheels
  - Wheels chain driven from gearboxes
  - Drive has encoder sensors for position tracking
  - Fuel collector uses chain-driven roller at end of manipulator arm
  - Manipulator arm uses 2 pneumatic cylinders for positioning
  - Line break sensor stops intake roller when target position reached
  - Shooter uses a Fairlane wheel, brass flywheel, 3:1 planetary 775 Pro
  - Main programming in C++ with autonomous sequences
capabilities:
  - Can breach all defenses
  - Scores in high goal
  - Intakes and shoots fuel efficiently
  - Autonomous defense crossing and shooting sequences
  - Sensor-based decision making and positioning
  - Repositions fuel into shooter with intake roller
competitions:
  - Greater Kansas City Regional
  - Iowa Regional
  - World Championship
  - Missouri State Championship
  - Indiana Robotics Invitational
  - CowTown ThrowDown
  - Kansas Cup
